spring:
  application:
    name: workload
  datasource:
    url: jdbc:h2:mem:workload-db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  # Json
  jackson:
    property-naming-strategy: SNAKE_CASE

eureka:
  client:
    enabled: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

server:
  port: 8081

logging:
  pattern:
    console: "%d{HH:mm:ss} [%X{transactionId}] %-5level %logger{36} - %msg%n"
  level:
    org.springframework.web: DEBUG
    com.fasterxml.jackson: DEBUG
